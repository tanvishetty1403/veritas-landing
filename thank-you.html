<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Slot Reserved | VERITAS</title>
  <link rel="stylesheet" href="css/style.css"> <style>
    body {
      background: #faf8f5;
      color: #2b2625;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .thank-you-card {
      text-align: center;
      padding: 3rem 2rem;
      background: #ffffff;
      border: 1px solid #eade94;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(43, 38, 37, 0.05);
      max-width: 480px;
      width: 90%;
    }
    .badge-icon {
      font-size: 3rem;
      color: #8c763e;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin: 0 0 1rem 0;
      color: #1a1615;
    }
    p {
      color: #615652;
      line-height: 1.6;
      margin: 0 0 2rem 0;
      font-size: 1rem;
    }
    .back-btn {
      display: inline-block;
      text-decoration: none;
      background: #1a1615;
      color: #ffffff;
      padding: 0.9rem 2rem;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s ease;
    }
    .back-btn:hover {
      background: #38312e;
    }

</head>
<body>

  <div class="thank-you-card">
